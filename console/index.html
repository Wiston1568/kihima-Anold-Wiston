<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMAND_CONSOLE // MULTI-BAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: #010409; color: #c9d1d9; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-item { transition: 0.3s; cursor: pointer; border-left: 3px solid transparent; }
        .nav-item.active { background: rgba(188, 19, 254, 0.1); border-left: 3px solid #bc13fe; color: white; }
        .view { display: none; animation: fadeIn 0.4s ease-in-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #21262d; border-radius: 10px; }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        /* Dropdown Style */
        .dropdown-content { position: absolute; right: 0; top: 50px; background: #0d1117; border: 1px solid #bc13fe33; border-radius: 8px; width: 200px; z-index: 50; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="w-64 border-r border-white/5 flex flex-col bg-black/20">
        <div class="p-6 mb-10 flex items-center gap-4">
            <div class="relative">
                <img src="../Pictures/logo.jpg" alt="Charlie" class="w-10 h-10 rounded-full border border-[#bc13fe] object-cover">
                <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-black rounded-full status-pulse"></div>
            </div>
            <div>
                <h1 class="text-sm font-black tracking-tighter text-white">COMMAND<span class="text-[#bc13fe]">_</span></h1>
                <p class="text-[8px] text-gray-500 uppercase">OP: CHARLIE // NODE_NAKURU</p>
            </div>
        </div>
        
        <nav class="flex-1 space-y-1">
            <div onclick="switchView('system')" id="nav-system" class="nav-item active p-4 flex items-center gap-3 text-xs"><span>[01]</span> CORE_SYSTEM</div>
            <div onclick="switchView('garden')" id="nav-garden" class="nav-item p-4 flex items-center gap-3 text-xs"><span>[02]</span> GARDEN_MONITOR</div>
            <div onclick="switchView('financial')" id="nav-financial" class="nav-item p-4 flex items-center gap-3 text-xs"><span>[03]</span> FINANCIAL_GRID</div>
            <div onclick="switchView('terminal')" id="nav-terminal" class="nav-item p-4 flex items-center gap-3 text-xs"><span>[04]</span> LIVE_TERMINAL</div>
            <div onclick="switchView('security')" id="nav-security" class="nav-item p-4 flex items-center gap-3 text-xs"><span>[05]</span> SECURITY_VAULT</div>
        </nav>

        <div class="p-6 border-t border-white/5 text-[10px] text-[#bc13fe] status-pulse">● SYSTEM_LIVE_CONNECTED</div>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="h-16 border-b border-white/5 flex items-center justify-end px-10 relative">
            <div class="relative">
                <button onclick="toggleDropdown()" class="flex items-center gap-2 hover:opacity-80 transition">
                    <span class="text-[10px] text-gray-400">SESSION: 0x1568</span>
                    <img src="../Pictures/logo.jpg" class="w-8 h-8 rounded-full border border-white/10">
                </button>
                <div id="logoutDropdown" class="dropdown-content hidden p-2 shadow-2xl">
                    <p class="text-[9px] p-2 text-gray-500 border-b border-white/5 mb-1 uppercase">Operator Settings</p>
                    <button onclick="switchView('security')" class="w-full text-left p-2 text-xs hover:bg-white/5 rounded text-white">Security Vault</button>
                    <button onclick="logout()" class="w-full text-left p-2 text-xs hover:bg-red-500/10 rounded text-red-500 mt-1">Terminate Session</button>
                </div>
            </div>
        </header>

        <div class="p-10">
            <section id="view-system" class="view active space-y-8">
                <h2 class="text-2xl font-bold text-white mb-8 border-b border-white/5 pb-4">CORE_SYSTEM_PROTOCOL</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="glass p-6 rounded-2xl space-y-4">
                        <h3 class="text-xs font-bold text-[#bc13fe] uppercase">Omni-Swapper</h3>
                        <input id="appId" type="text" placeholder="APP_ID" class="w-full bg-black border border-white/10 p-3 rounded text-sm text-white">
                        <input id="streamLink" type="text" placeholder="STREAM_URL" class="w-full bg-black border border-white/10 p-3 rounded text-sm text-white">
                        <button class="w-full bg-[#bc13fe] hover:bg-[#a011d8] py-3 rounded font-bold text-xs uppercase transition text-white">Push to Vault</button>
                    </div>
                </div>
            </section>

            <section id="view-security" class="view space-y-8">
                <h2 class="text-2xl font-bold text-white mb-8 border-b border-white/5 pb-4">SECURITY_PROTOCOL_VAULT</h2>
                <div class="glass p-8 rounded-2xl max-w-xl">
                    <h3 class="text-xs font-bold text-[#bc13fe] mb-6 uppercase">Credential Management</h3>
                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] text-gray-500 block mb-2 uppercase">Update Master PIN</label>
                            <div class="flex gap-2">
                                <input id="newPin" type="password" placeholder="••••" maxlength="4" class="flex-1 bg-black border border-white/10 p-4 rounded text-sm text-white text-center tracking-widest">
                                <button onclick="updateSystemPin()" class="bg-[#bc13fe] px-6 rounded font-bold text-xs uppercase text-white">Commit_Change</button>
                            </div>
                        </div>
                        <div class="pt-6 border-t border-white/5">
                            <button onclick="logout()" class="w-full bg-red-900/20 border border-red-500/20 text-red-500 hover:bg-red-900/40 py-4 rounded text-xs font-bold uppercase transition">Terminate Session (Logout)</button>
                        </div>
                    </div>
                </div>
            </section>

            </div>
    </main>

    <script>
        const API_BASE = 'https://kihima-backend.onrender.com/api/v1';
        const token = localStorage.getItem('charlie_token');

        if (!token) window.location.href = '../index.html';

        // DROPDOWN LOGIC
        function toggleDropdown() { document.getElementById('logoutDropdown').classList.toggle('hidden'); }
        window.onclick = (e) => { if (!e.target.closest('button')) document.getElementById('logoutDropdown').classList.add('hidden'); }

        // NEW PIN RESET LOGIC
        async function updateSystemPin() {
            const newPin = document.getElementById('newPin').value;
            if (newPin.length < 4) return alert("ERROR: PIN_MUST_BE_4_DIGITS");

            try {
                const res = await fetch(`${API_BASE}/auth/reset-pin`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ newPin })
                });

                if (res.ok) {
                    logTerminal("SUCCESS: System PIN updated in database.");
                    alert("PIN UPDATED SUCCESSFULLY");
                    document.getElementById('newPin').value = '';
                } else {
                    alert("ERROR: SESSION_EXPIRED_OR_UNAUTHORIZED");
                }
            } catch(e) {
                logTerminal("FAILURE: Could not reach backend node.");
            }
        }

        function logout() {
            localStorage.removeItem('charlie_token');
            window.location.href = '../index.html';
        }

        function switchView(viewId) {
            document.querySelectorAll('.view, .nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            document.getElementById(`nav-${viewId}`).classList.add('active');
            logTerminal(`Switched to ${viewId.toUpperCase()}`);
        }

        function logTerminal(msg) {
            const term = document.getElementById('terminalOutput');
            if(!term) return;
            const p = document.createElement('p');
            p.innerHTML = `<span class="text-[#bc13fe]">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            term.appendChild(p);
            term.scrollTop = term.scrollHeight;
        }

        window.onload = () => { logTerminal("Charlie session initialized."); }
    </script>
</body>
</html>
